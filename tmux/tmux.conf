# =============================================================================
# Tmux 설정 — my-settings/tmux/tmux.conf (~/.tmux.conf 심볼릭 링크)
# prefix는 Ctrl+a. 설정 변경 후 prefix+r 로 즉시 리로드.
# =============================================================================

# => 일반
set-option -g history-limit 5000          # 스크롤백 버퍼 줄 수
set-option -s escape-time 10              # ESC 입력 지연 최소화 (vim 모드 전환 반응속도)
set-option -s focus-events on             # 터미널 포커스 이벤트 전달 (vim autoread 등에 필요)
set-option -sg repeat-time 600            # -r 붙은 키(리사이즈 등)의 연타 허용 시간(ms)

# => 터미널 색상 — tmux 내부는 tmux-256color(이탤릭 등 지원, 현대 권장값),
#    바깥 터미널(iTerm=xterm-256color)에는 Truecolor(Tc) 능력을 선언
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# => 번호 — 창/pane 번호를 0이 아닌 1부터 시작 (키보드 위치상 1이 가까움)
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on         # 창 닫으면 번호 자동 재정렬

# => 표시
set-option -g display-panes-time 800      # prefix+q pane 번호 표시 시간(ms)
set-option -g display-time 1000           # 상태 메시지 표시 시간(ms)
set-option -g status-interval 10          # 상태줄 갱신 주기(초)
set-option -g set-titles on               # 터미널 창 제목을 tmux가 설정
set-window-option -g automatic-rename on  # 실행 중인 명령으로 창 이름 자동 변경

# => 활동 감지 — 다른 창에서 출력 발생 시 상태줄에만 표시 (팝업 알림은 끔)
set-option -g monitor-activity on
set-option -g visual-activity off

# => 마우스 — 스크롤, pane 선택/리사이즈, 창 전환
set-option -g mouse on

# => Prefix 키를 Ctrl+b → Ctrl+a 로 변경 (한 손으로 누르기 편함)
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix                  # C-a 두 번 = 셸에 실제 C-a 전달

# => 복사 모드에서 vi 키 사용 (prefix+[ 진입 후 hjkl/v/y)
set-window-option -g mode-keys vi

# => 화면 분할 — 현재 pane의 작업 디렉터리를 유지한 채 분할
bind-key - split-window -v -c "#{pane_current_path}"     # prefix+- : 가로 분할(위아래)
bind-key \\ split-window -h -c "#{pane_current_path}"    # prefix+\ : 세로 분할(좌우)

# => pane 이동 — vi 스타일 hjkl (-r: prefix 한 번 누르고 연타 가능)
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# => pane 크기 조절 — Shift+HJKL, 2칸씩
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2

# => 설정 리로드 — prefix+r
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# => 상태줄 — 좌측: 세션명 / 우측: 날짜시간 + 호스트명 / 현재 창은 청록색 강조
set-option -g message-style "none"
set-option -g message-command-style "none"

set-option -g status "on"
set-option -g status-justify "left"
set-option -g status-style "none"

set-option -g status-left-length "100"
set-option -g status-left-style "none"
set-option -g status-left " #[fg=yellow,bold]#S#[fg=default,nobold] | "

set-option -g status-right-length "100"
set-option -g status-right-style "none"
set-option -g status-right " | #[bold]%Y-%m-%d %H:%M#[nobold] | #[fg=green,bold]#h#[fg=default,nobold] "

set-window-option -g window-status-style "none"
set-window-option -g window-status-activity-style "none"
set-window-option -g window-status-format "#I:#W"
set-window-option -g window-status-current-format "#[fg=cyan,bold]#I:#W#F#[fg=default,nobold]"
set-window-option -g window-status-separator " "

# => pane 테두리 — 활성 pane은 청록색
set-option -g pane-border-style "fg=default,bold"
set-option -g pane-active-border-style "fg=cyan,bold"
